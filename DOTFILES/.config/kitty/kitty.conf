# Kitty Terminal Configuration
# Catppuccin Mocha Theme

# === Transparency ===
background_opacity 0.85

# === Catppuccin Mocha Colors ===
# Base colors
background #1e1e2e
foreground #cdd6f4

# Surface colors
selection_background #45475a
selection_foreground #cdd6f4

# Cursor
cursor #f5e0dc
cursor_text_color #1e1e2e

# Tab bar
active_tab_foreground #1e1e2e
active_tab_background #f38ba8
inactive_tab_foreground #a6adc8
inactive_tab_background #313244

# Scrollbar and scrollmarker
scrollbar_background #313244
scrollbar_foreground #f38ba8
scrollmarker_green #a6e3a1
scrollmarker_red #f38ba8
scrollmarker_yellow #f9e2af

# ANSI colors
color0 #45475a
color1 #f38ba8
color2 #a6e3a1
color3 #f9e2af
color4 #89b4fa
color5 #f5c2e7
color6 #94e2d5
color7 #b4befe

# Bright colors
color8 #45475a
color9 #f38ba8
color10 #a6e3a1
color11 #f9e2af
color12 #89b4fa
color13 #f5c2e7
color14 #94e2d5
color15 #b4befe

# === Fonts ===
font_family JetBrainsMono Nerd Font
font_size 11.5

# === Window Styling ===
window_margin_width 5
window_padding_width 5

# === Session / Performance ===
scrollback_lines 10000
